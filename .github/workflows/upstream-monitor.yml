name: Track upstream changes

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: upstream-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out fork
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor unit tests
        run: python3 -m unittest tests/ultra-fork/test_upstream_monitor.py -v

      - name: Query public upstream state
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/check-upstream.py

      - name: Detect semantic state change
        id: state
        shell: bash
        run: |
          if git diff --quiet -- tracking/upstream-state.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changed state only
        if: steps.state.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- tracking/upstream-state.json
          git commit -m "chore: update upstream tracking state"
          git push
